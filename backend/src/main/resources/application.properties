spring.application.name=easytraza

# Datos de conexi\u00f3n MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/easytraza?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.address=0.0.0.0
server.port=8443

# SSL
server.ssl.key-store=./keystore.p12
server.ssl.key-store-password=canviar
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=easytraza

# Thymeleaf
spring.thymeleaf.cache=false
spring.messages.encoding=UTF-8
spring.messages.basename=messages
spring.messages.cache-duration=0

# Tama\u00f1o m\u00e1ximo de archivos
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==================== OCR TESSERACT ====================
tesseract.datapath=C:/Program Files/Tesseract-OCR/tessdata
tesseract.language=spa+cat
tesseract.page-seg-mode=4

# ==================== GROQ AI ====================
groq.api-key=YOUR_GROQ_API_KEY
groq.model=llama-3.3-70b-versatile
groq.endpoint=https://api.groq.com/openai/v1/chat/completions

# ==================== MAIL (SMTP) ====================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=rlopez@alumnat.copernic.cat
spring.mail.password=YOUR_EMAIL_PASSWORD
spring.mail.properties.mail.smtp.auth=true  
spring.mail.properties.mail.smtp.starttls.enable=true

# ==================== APP ====================
app.upload-dir=./uploads/albaranes
app.base-url=https://localhost:8443

# ==================== SESSIO ====================
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

# ==================== LOGS ====================
logging.level.cat.copernic.easytraza=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/easytraza.log
logging.file.max-size=10MB
logging.file.max-history=7


