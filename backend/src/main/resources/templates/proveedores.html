<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Proveedores - EasyTraza</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" th:href="@{/proveedores.css}">
    <link rel="stylesheet" th:href="@{/buttons.css}">
    </head>
    <body>
        <div class="app-container">
    <aside class="sidebar" th:replace="~{fragments/sidebar :: sidebar('proveedores')}">
    </aside>

            <main class="main-content">
                <header class="top-header">
                    <h1 class="page-title" th:text="#{proveidor.titol}">Proveedores</h1>
                    <div class="header-actions">
                        <div class="language-selector">
                            <a href="?lang=es" th:classappend="${#locale.language == 'es' ? 'active' : ''}">ES</a><span>|</span><a href="?lang=ca" th:classappend="${#locale.language == 'ca' ? 'active' : ''}">CA</a>
                        </div>
                        <div class="user-profile" onclick="toggleUserMenu()">
                            <div class="avatar" style="position:relative;"><span th:text="${session.usuario?.getIniciales()}">SA</span><img th:if="${session.usuario?.fotoUrl}" th:src="${session.usuario?.fotoUrl}" alt="Foto" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.remove()"></div>
                            <div class="user-info-header">
                                <span class="user-name" th:text="${session.usuario?.nombre}">Rafa Morante</span>
                                <span class="user-role" th:text="${session.usuario?.rol == 'ADMIN' ? 'Administrador' : session.usuario?.rol == 'TRABAJADOR' ? 'Trabajador' : session.usuario?.rol == 'SUPER_ADMIN' ? 'Super Admin' : session.usuario?.rol}">Trabajador</span>
                            </div>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                </header>

                <div id="userMenu" class="user-dropdown-menu" style="display: none;">
                    <div class="dropdown-header">
                        <strong th:text="${session.usuario?.nombre}">Rafa Morante</strong>
                        <small th:text="${session.usuario?.rol == 'ADMIN' ? 'Administrador' : session.usuario?.rol == 'TRABAJADOR' ? 'Trabajador' : session.usuario?.rol == 'SUPER_ADMIN' ? 'Super Admin' : session.usuario?.rol}">Trabajador</small>
                    </div>
                    <a href="/logout" class="dropdown-item logout"><i class="fas fa-sign-out-alt"></i> Cerrar</a>
                </div>

                <div class="content-area">
                    <div class="actions-bar">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput"  th:placeholder="#{cercar}" onkeyup="buscarProveedores()">
                        </div>
                        <button class="btn-primary" onclick="mostrarFormularioNuevo()">
                            <i class="fas fa-plus"></i> <span th:text="#{proveidor.nou}">Nuevo Proveedor</span>
                        </button>
                    </div>

                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th th:text="#{proveidor.nif}">CIF</th>
                                    <th th:text="#{proveidor.nom}">Nombre</th>
                                    <th th:text="#{proveidor.telefon}">Teléfono</th>
                                    <th th:text="#{proveidor.direccio}">Dirección</th>
                                    <th>Observaciones</th>
                                    <th th:text="#{accions}">Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaProveedores">
                                <tr><td colspan="6" class="text-center" th:text="#{carregant}">Cargando...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>

        <!-- Modal Proveedor -->
        <div class="modal fade" id="proveedorModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle" th:text="#{proveidor.nou}">Nuevo Proveedor</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" th:aria-label="#{tancar}"></button>
                    </div>
                    <div class="modal-body">
                        <form id="proveedorForm">
                            <input type="hidden" id="proveedorId">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label th:text="#{proveidor.nom}">Nombre *</label>
                                        <input type="text" class="form-control" id="nombre" required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label th:text="#{proveidor.telefon}">Teléfono</label>
                                        <input type="tel" class="form-control" id="telefono" placeholder="Ej: 123456789" maxlength="9" pattern="[0-9]{9}">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label th:text="#{proveidor.nif}">CIF *</label>
                                        <input type="text" class="form-control" id="cif" maxlength="9" placeholder="Ej: 12345678A" required>
                                    </div>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="direccion" class="form-label" th:text="#{proveidor.direccio}">Dirección</label>
                                <textarea class="form-control" id="direccion" rows="2" placeholder="Calle, número, ciudad..."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Observaciones</label>
                                <textarea class="form-control" id="observaciones" rows="3"></textarea>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" data-bs-dismiss="modal" th:text="#{cancelar}">Cancelar</button>
                        <button type="button" class="btn-primary" onclick="guardarProveedor()" th:text="#{guardar}">Guardar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Confirmar Eliminar -->
        <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header" style="background: #dc3545; color: white;">
                        <h5 class="modal-title"><i class="fas fa-exclamation-triangle"></i> <span th:text="#{eliminar}">Confirmar eliminación</span></h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" th:aria-label="#{tancar}"></button>
                    </div>
                    <div class="modal-body">
                        <p id="deleteMessage" th:text="#{usuari.confirmar.eliminar}">¿Estás seguro?</p>
                        <small class="text-muted" th:text="#{usuari.no.desfer}">Esta acción no se puede deshacer.</small>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="btn-danger" id="confirmDeleteBtn"><i class="fas fa-trash"></i> <span th:text="#{eliminar}">Eliminar</span></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Error -->
        <div class="modal fade" id="errorDeleteModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title"><i class="fas fa-exclamation-circle"></i> Error</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" th:aria-label="#{tancar}"></button>
                    </div>
                    <div class="modal-body">
                        <p class="mb-0" id="errorDeleteMsg"></p>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" data-bs-dismiss="modal">Tancar</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:inline="javascript">var ES_TRABAJADOR = /*[[${session.usuario?.rol == 'TRABAJADOR'}]]*/ false;</script>
        <script th:src="@{/proveedores.js}"></script>
    </body>
</html>
