<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Clients - EasyTraza</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
        <link rel="stylesheet" th:href="@{/usuarios.css}">
        <link rel="stylesheet" th:href="@{/clientes.css}">
    <link rel="stylesheet" th:href="@{/buttons.css}">
    </head>
    <body>
        <div class="app-container">
    <aside class="sidebar" th:replace="~{fragments/sidebar :: sidebar('clientes')}">
    </aside>

            <main class="main-content">
                <header class="top-header">
                    <h1 class="page-title"><i class="fas fa-users"></i> <span th:text="#{client.titol}">Clients</span></h1>
                    <div class="header-actions">
                        <div class="language-selector">
                            <a href="?lang=es" th:classappend="${#locale.language == 'es' ? 'active' : ''}">ES</a><span>|</span><a href="?lang=ca" th:classappend="${#locale.language == 'ca' ? 'active' : ''}">CA</a>
                        </div>
                        <div class="user-profile" onclick="toggleUserMenu()">
                            <div class="avatar" style="position:relative;"><span th:text="${session.usuario?.getIniciales()}">SA</span><img th:if="${session.usuario?.fotoUrl}" th:src="${session.usuario?.fotoUrl}" alt="Foto" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.remove()"></div>
                            <div class="user-info-header">
                                <span class="user-name" th:text="${session.usuario?.nombre}">Rafa Morante</span>
                                <span class="user-role" th:text="${session.usuario?.rol == 'ADMIN' ? 'Administrador' : session.usuario?.rol == 'TRABAJADOR' ? 'Trabajador' : session.usuario?.rol == 'SUPER_ADMIN' ? 'Super Admin' : session.usuario?.rol}">Administrador</span>
                            </div>
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                </header>

                <div id="userMenu" class="user-dropdown-menu" style="display: none;">
                    <div class="dropdown-header">
                        <strong th:text="${session.usuario?.nombre}">Rafa Morante</strong>
                        <small th:text="${session.usuario?.rol == 'ADMIN' ? 'Administrador' : session.usuario?.rol == 'TRABAJADOR' ? 'Trabajador' : session.usuario?.rol == 'SUPER_ADMIN' ? 'Super Admin' : session.usuario?.rol}">Administrador</small>
                    </div>
                    <a href="/logout" class="dropdown-item logout"><i class="fas fa-sign-out-alt"></i> <span th:text="#{titol.sortir}">Tancar sessió</span></a>
                </div>

                <div class="content-area">
                    <div class="actions-bar" style="display:flex;align-items:center;gap:12px;">
                        <div class="search-box" style="flex:1;">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput"  th:placeholder="#{cercar}" onkeyup="filtrarClients()">
                        </div>
                        <button class="btn-primary" onclick="mostrarFormulariNou()"><i class="fas fa-plus"></i> <span th:text="#{client.nou}">Nou Client</span></button>
                    </div>

                    <div class="table-wrapper">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th th:text="#{client.nif}">NIF</th>
                                    <th th:text="#{client.nom}">Nom</th>
                                    <th th:text="#{client.cognoms}">Cognoms</th>
                                    <th th:text="#{client.telefon}">Telèfon</th>
                                    <th>Email</th>
                                    <th th:text="#{client.direccio}">Adreça</th>
                                    <th>Observacions</th>
                                    <th th:text="#{usuari.estat}">Estat</th>
                                    <th th:text="#{accions}">Accions</th>
                                </tr>
                            </thead>
                            <tbody id="clientsBody">
                                <tr><td colspan="9" class="text-center py-4" th:text="#{carregant}">Carregant...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>

        <!-- Modal Client -->
        <div class="modal fade" id="clientModal" tabindex="-1">
            <div class="modal-dialog modal-lg">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="modalTitle"><i class="fas fa-plus"></i> <span th:text="#{client.nou}">Nou Client</span></h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" th:aria-label="#{tancar}"></button>
                    </div>
                    <div class="modal-body">
                        <form id="clientForm">
                            <input type="hidden" id="editId">
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label"><span th:text="#{client.nif}">NIF</span> <span style="color:red;">*</span></label><input type="text" id="clientNif" class="form-control" required></div>
                                <div class="col-md-6 mb-3"><label class="form-label"><span th:text="#{client.nom}">Nom</span> <span style="color:red;">*</span></label><input type="text" id="clientNom" class="form-control" required></div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label" th:text="#{client.cognoms}">Cognoms</label><input type="text" id="clientCognoms" class="form-control"></div>
                                <div class="col-md-6 mb-3"><label class="form-label"><span th:text="#{client.telefon}">Telèfon</span> <span style="color:red;">*</span></label><input type="tel" id="clientTelefon" class="form-control" maxlength="9" required></div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3"><label class="form-label">Email</label><input type="email" id="clientEmail" class="form-control"></div>
                                <div class="col-md-6 mb-3"><label class="form-label" th:text="#{client.direccio}">Adreça</label><input type="text" id="clientAdreca" class="form-control"></div>
                            </div>
                            <div class="mb-3"><label class="form-label">Observacions</label><textarea id="clientObservacions" class="form-control" rows="2"></textarea></div>
                            <div class="mb-3 form-check form-switch">
                                <input type="checkbox" id="clientActivo" class="form-check-input" checked>
                                <label class="form-check-label" for="clientActivo" th:text="#{usuari.actiu}">Actiu</label>
                            </div>
                        </form>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn-secondary" data-bs-dismiss="modal" th:text="#{cancelar}">Cancel·lar</button>
                        <button type="button" class="btn-primary" onclick="guardarClient()" th:text="#{guardar}">Guardar Client</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Modal Confirmar Eliminació Client -->
        <div id="confirmDeleteClientModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99999; justify-content: center; align-items: center;">
            <div style="background: white; border-radius: 12px; padding: 30px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
                <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: #dc3545; margin-bottom: 15px;"></i>
                <h4 th:text="#{eliminar}">Eliminar client?</h4>
                <p id="confirmDeleteClientMsg" style="color: #666;" th:text="#{usuari.no.desfer}">Aquesta acció no es pot desfer.</p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 20px;">
                    <button onclick="tancarConfirmClientModal()" style="padding: 10px 20px; border: 1px solid #ccc; border-radius: 6px; background: white; cursor: pointer;" th:text="#{cancelar}">Cancel·lar</button>
                    <button id="btnConfirmDeleteClient" onclick="confirmarEliminarClient()" style="padding: 10px 20px; border: none; border-radius: 6px; background: #dc3545; color: white; cursor: pointer;" th:text="#{eliminar}">Eliminar</button>
                </div>
            </div>
        </div>

        <!-- Modal Error Client -->
        <div id="errorClientModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 99999; justify-content: center; align-items: center;">
            <div style="background: white; border-radius: 12px; padding: 30px; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
                <i class="fas fa-times-circle" style="font-size: 48px; color: #dc3545; margin-bottom: 15px;"></i>
                <h4>Error</h4>
                <p id="errorClientMsg" style="color: #666;"></p>
                <div style="margin-top: 20px;">
                    <button onclick="tancarErrorClientModal()" style="padding: 10px 20px; border: none; border-radius: 6px; background: #dc3545; color: white; cursor: pointer;">D'acord</button>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:inline="javascript">var ES_TRABAJADOR = /*[[${session.usuario?.rol == 'TRABAJADOR'}]]*/ false;</script>
        <script th:src="@{/clientes.js}"></script>
        <script>
        function toggleUserMenu() {
            const m = document.getElementById('userMenu');
            if (m) m.style.display = m.style.display === 'none' ? 'block' : 'none';
        }
        </script>
    </body>
</html>
