<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EasyTraza - Recuperar Contraseña</title>
        <link rel="stylesheet" href="/login.css">
    </head>
    <body>
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <img src="/img/logo.png" alt="EasyTraza" class="logo">
                    <h1>EasyTraza</h1>
                    <p>Trazabilidad</p>
                </div>

                <div class="login-body">
                    <h2 th:text="#{login.olvidat}">Recuperar Contraseña</h2>

                    <div th:if="${success != null}" style="background:#d4edda;color:#155724;padding:15px;border-radius:10px;margin-bottom:20px;font-size:14px;text-align:center;">
                        Si el email existe en el sistema, recibirás un código de verificación.
                    </div>

                    <div th:if="${devCode != null}" style="background:#fff3cd;color:#856404;padding:15px;border-radius:10px;margin-bottom:20px;font-size:14px;text-align:center;border:1px dashed #856404;">
                        <strong>⚠️ Modo desarrollo - Email no configurado</strong><br>
                        Tu código de verificación es: <span style="font-size:24px;font-weight:bold;font-family:monospace;letter-spacing:4px;display:block;margin:10px 0;" th:text="${devCode}"></span>
                        <span style="font-size:12px;">(expira en 10 minutos)</span>
                    </div>

                    <div th:if="${success != null}" style="text-align:center;margin-top:20px;">
                        <a th:href="@{/verify-code(email=${email})}" class="btn-confirm" style="display:inline-block;padding:12px 30px;text-decoration:none;border-radius:10px;">Introducir Código</a>
                    </div>

                    <form th:unless="${success}" th:action="@{/forgot-password}" method="post" style="margin-top:10px;">
                        <div class="form-group" style="margin-bottom:20px;">
                            <label for="email" th:text="#{login.password}">Introduce tu email</label>
                            <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;">
                        </div>

                        <div class="password-modal-footer" style="justify-content:center;padding:0;">
                            <button type="submit" class="btn-confirm" style="width:100%;padding:12px 20px;" th:text="#{login.entrar}">Enviar Código</button>
                        </div>
                    </form>

                    <div style="text-align:center;margin-top:25px;">
                        <a href="/login" style="color:#667eea;font-size:14px;text-decoration:none;" th:text="#{login.volver}">Volver al inicio de sesión</a>
                    </div>
                </div>

                <div class="login-footer">
                    <p th:text="#{login.lloc}">EasyTraza - Sistema de Trazabilidad</p>
                </div>
            </div>
        </div>
    </body>
</html>
