<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EasyTraza - Restablecer Contraseña</title>
        <link rel="stylesheet" href="/login.css">
    </head>
    <body>
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <img src="/img/logo.png" alt="EasyTraza" class="logo">
                    <h1>EasyTraza</h1>
                    <p>Trazabilidad</p>
                </div>

                <div class="login-body">
                    <div style="text-align:right;margin-bottom:10px;">
                        <a href="?lang=es" style="color:#A0522D;text-decoration:none;font-weight:bold;padding:4px 8px;">ES</a>
                        <span style="color:#ccc;">|</span>
                        <a href="?lang=ca" style="color:#A0522D;text-decoration:none;font-weight:bold;padding:4px 8px;">CA</a>
                    </div>
                    <h2 th:text="#{login.restablir}">Restablecer Contraseña</h2>

                    <div th:if="${success != null}" style="background:#d4edda;color:#155724;padding:15px;border-radius:10px;margin-bottom:20px;font-size:14px;text-align:center;" th:text="${success}">
                    </div>

                    <div th:if="${success != null}" style="text-align:center;margin-top:20px;">
                        <a href="/login" class="btn-confirm" style="display:inline-block;padding:12px 30px;text-decoration:none;border-radius:10px;">Iniciar Sesión</a>
                    </div>

                    <div th:if="${error}" style="background:#fff8f8;color:#dc3545;padding:12px;border-radius:10px;margin-bottom:20px;font-size:14px;text-align:center;border-left:3px solid #dc3545;" th:text="${error}">
                    </div>

                    <form th:unless="${success}" th:action="@{/reset-password}" method="post" style="margin-top:10px;">
                        <input type="hidden" name="token" th:value="${token}">

                        <div class="form-group" style="margin-bottom:20px;">
                            <label for="password" style="display:block;font-size:14px;font-weight:500;color:#333;margin-bottom:8px;">Nueva Contraseña (mínimo 6 caracteres)</label>
                            <input type="password" id="password" name="password" placeholder="Nueva contraseña" required minlength="6" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;">
                        </div>

                        <div class="form-group" style="margin-bottom:20px;">
                            <label for="confirmPassword" style="display:block;font-size:14px;font-weight:500;color:#333;margin-bottom:8px;">Confirmar Contraseña</label>
                            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirmar contraseña" required minlength="6" style="width:100%;padding:12px;border:1px solid #ddd;border-radius:10px;font-size:14px;outline:none;box-sizing:border-box;">
                        </div>

                        <div class="password-modal-footer" style="justify-content:center;padding:0;">
                            <button type="submit" class="btn-confirm" style="width:100%;padding:12px 20px;" th:text="#{login.restablir}">Restablecer Contraseña</button>
                        </div>
                    </form>

                    <div style="text-align:center;margin-top:25px;">
                        <a href="/login" style="color:#667eea;font-size:14px;text-decoration:none;">Volver al inicio de sesión</a>
                    </div>
                </div>

                <div class="login-footer">
                    <p>EasyTraza - Sistema de Trazabilidad</p>
                </div>
            </div>
        </div>
    </body>
</html>
