<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>EasyTraza - Login</title>
        <link rel="stylesheet" href="/login.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    </head>
    <body>
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <img src="/img/logo.png" alt="EasyTraza" class="logo">
                    <h1>EasyTraza</h1>
                    <p>Trazabilidad</p>
                </div>

                <div class="login-body">
                    <div style="text-align:right;margin-bottom:10px;">
                        <a href="?lang=es" th:style="${#locale.language == 'es'} ? 'color:#A0522D;text-decoration:none;font-weight:bold;padding:4px 8px;' : 'color:#A0522D;text-decoration:none;font-weight:normal;padding:4px 8px;'">ES</a>
                        <span style="color:#ccc;">|</span>
                        <a href="?lang=ca" th:style="${#locale.language == 'ca'} ? 'color:#A0522D;text-decoration:none;font-weight:bold;padding:4px 8px;' : 'color:#A0522D;text-decoration:none;font-weight:normal;padding:4px 8px;'">CA</a>
                    </div>
                    <h2 th:text="#{login.titol}">Selecciona un usuario</h2>

                    <div class="usuarios-grid" id="usuariosGrid">
                        <div class="loading">Cargando usuarios...</div>
                    </div>
                </div>

                <div class="login-footer">
                    <a href="/forgot-password" class="forgot-password-link" th:text="#{login.olvidat}">¿Has olvidado tu contraseña?</a>
                    <p th:text="#{login.lloc}">EasyTraza - Sistema de Trazabilidad</p>
                </div>
            </div>
        </div>

     
        <!-- Modal de contraseña -->
        <div id="passwordModal" class="password-modal">
            <div class="password-modal-content">
                <div class="password-modal-header">
                    <div class="user-avatar-large" id="modalAvatar">SA</div>
                    <h3 id="modalUserName">Super Admin</h3>
                </div>
                <div class="password-modal-body">
                    <label for="passwordInput">Contraseña</label>
                    <div style="display:flex;gap:0;">
                        <input type="password" id="passwordInput" th:placeholder="#{login.password.placeholder}" autocomplete="off" style="flex:1;padding:12px;border:1px solid #ddd;border-radius:10px 0 0 10px;font-size:14px;outline:none;">
                        <button type="button" onclick="toggleLoginPassword()" aria-label="Mostrar contrasenya" style="padding:6px 12px;border:1px solid #ddd;border-left:none;border-radius:0 10px 10px 0;background:white;cursor:pointer;">
                            <i class="fas fa-eye" id="loginPasswordIcon"></i>
                        </button>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>
                <div class="password-modal-footer">
                    <button class="btn-cancel" type="button" onclick="cerrarPasswordModal()">Cancelar</button>
                    <button class="btn-confirm" type="button" onclick="confirmarPassword()">Entrar</button>
                </div>
            </div>
        </div>

        <script src="/login.js"></script>
    </body>
</html>
