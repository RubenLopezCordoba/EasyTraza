<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lots - EasyTraza</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/albarans.css}">
    <link rel="stylesheet" th:href="@{/lots.css}">
    <link rel="stylesheet" th:href="@{/buttons.css}">
</head>
<body>
<div class="app-container">
    <aside class="sidebar" th:replace="~{fragments/sidebar :: sidebar('lotes')}">
    </aside>
    <main class="main-content">
        <header class="top-header">
            <h1 class="page-title" th:text="#{lots.titol}">Gestió de Lots</h1>
            <div class="header-actions">
                <div class="language-selector">
                    <a href="?lang=es" th:classappend="${#locale.language == 'es' ? 'active' : ''}">ES</a><span>|</span><a href="?lang=ca" th:classappend="${#locale.language == 'ca' ? 'active' : ''}">CA</a>
                </div>
                <div class="user-profile" onclick="toggleUserMenu()">
                    <div class="avatar" style="position:relative;"><span th:text="${session.usuario?.getIniciales()}">SA</span><img th:if="${session.usuario?.fotoUrl}" th:src="${session.usuario?.fotoUrl}" alt="Foto" style="position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.remove()"></div>
                    <div class="user-info-header">
                        <span class="user-name" th:text="${session.usuario?.nombre}">Super Admin</span>
                        <span class="user-role" th:text="${session.usuario?.rol == 'ADMIN' ? 'Administrador' : session.usuario?.rol == 'TRABAJADOR' ? 'Trabajador' : session.usuario?.rol == 'SUPER_ADMIN' ? 'Super Admin' : session.usuario?.rol}">Administrador</span>
                    </div>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>
        <div id="userMenu" class="user-dropdown-menu" style="display:none;">
            <div class="dropdown-header">
                <strong th:text="${session.usuario?.nombre}">Super Admin</strong>
                <small th:text="${session.usuario?.rol == 'ADMIN' ? 'Administrador' : session.usuario?.rol == 'TRABAJADOR' ? 'Trabajador' : session.usuario?.rol == 'SUPER_ADMIN' ? 'Super Admin' : session.usuario?.rol}">Administrador</small>
            </div>
            <a href="/logout" class="dropdown-item logout"><i class="fas fa-sign-out-alt"></i> <span th:text="#{titol.sortir}">Tancar sessió</span></a>
        </div>
        <div class="content-card">
            <div class="content-header">
                <div class="filter-tabs">
                    <button class="filter-tab active" data-filtre="tots" onclick="filtrarPerEstat('tots')"><span th:text="#{lots.tots}">Tots</span></button>
                    <button class="filter-tab" data-filtre="EN_ESTOC" onclick="filtrarPerEstat('EN_ESTOC')"><span th:text="#{lots.en.estoc}">En Estoc</span></button>
                    <button class="filter-tab" data-filtre="OBERT" onclick="filtrarPerEstat('OBERT')"><span th:text="#{lots.oberts}">Oberts</span></button>
                    <button class="filter-tab" data-filtre="ACABAT" onclick="filtrarPerEstat('ACABAT')"><span th:text="#{lots.acabats}">Acabats</span></button>
                </div>
            </div>
            <div class="filters-advanced" style="display:flex;flex-wrap:wrap;gap:12px;padding:12px 0;align-items:flex-end;">
                <div class="filter-group">
                    <label style="font-size:11px;color:#666;margin-bottom:2px;"><i class="fas fa-tag"></i> <span th:text="#{lots.id.lot}">ID Lot</span></label>
                    <input type="text" id="filterIdLot" class="form-control form-control-sm" th:placeholder="#{lots.id.lot}" onkeyup="aplicarFiltres()" style="width:80px;">
                </div>
                <div class="filter-group">
                    <label style="font-size:11px;color:#666;margin-bottom:2px;"><i class="fas fa-filter"></i> <span th:text="#{lots.estat}">Estat</span></label>
                    <select id="filterEstat" class="form-select form-select-sm" onchange="aplicarFiltres()" style="width:120px;">
                        <option value="" th:text="#{lots.tots}">Tots</option>
                        <option value="EN_ESTOC" th:text="#{lots.en.estoc}">En Estoc</option>
                        <option value="OBERT" th:text="#{lots.oberts}">Oberts</option>
                        <option value="ACABAT" th:text="#{lots.acabats}">Acabats</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label style="font-size:11px;color:#666;margin-bottom:2px;"><i class="fas fa-box"></i> <span th:text="#{lots.materia.primera}">Matèria Primera</span></label>
                    <select id="filterMateria" class="form-select form-select-sm" onchange="aplicarFiltres()" style="width:160px;">
                        <option value="" th:text="#{lots.tots}">Tots</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label style="font-size:11px;color:#666;margin-bottom:2px;"><i class="fas fa-calendar"></i> <span th:text="#{lots.data}">Data</span></label>
                    <input type="date" id="filterData" class="form-control form-control-sm" onchange="aplicarFiltres()" style="width:140px;">
                </div>
                <div class="filter-group">
                    <button class="btn btn-sm btn-outline-secondary" onclick="netejarFiltres()" title="Netejar filtres">
                        <i class="fas fa-times"></i> <span th:text="#{netejar}">Netejar</span>
                    </button>
                </div>
            </div>
            <div class="table-container">
                <table class="table-custom">
                    <thead>
                        <tr>
                            <th onclick="ordenarLots('idLot')" style="cursor:pointer;user-select:none;">ID <i class="fas fa-sort" id="sort-idLot"></i></th>
                            <th onclick="ordenarLots('numLot')" style="cursor:pointer;user-select:none;"><span th:text="#{lots.numero}">Nº Lot</span> <i class="fas fa-sort" id="sort-numLot"></i></th>
                            <th onclick="ordenarLots('producte')" style="cursor:pointer;user-select:none;"><span th:text="#{lots.materia.primera}">Matèria Primera</span> <i class="fas fa-sort" id="sort-producte"></i></th>
                            <th onclick="ordenarLots('quantitat')" style="cursor:pointer;user-select:none;"><span th:text="#{lots.quantitat}">Quantitat</span> <i class="fas fa-sort" id="sort-quantitat"></i></th>
                            <th onclick="ordenarLots('estat')" style="cursor:pointer;user-select:none;"><span th:text="#{lots.estat}">Estat</span> <i class="fas fa-sort" id="sort-estat"></i></th>
                            <th>Inici</th>
                            <th>Final</th>
                            <th onclick="ordenarLots('albara')" style="cursor:pointer;user-select:none;"><span th:text="#{lots.albara}">Albarà</span> <i class="fas fa-sort" id="sort-albara"></i></th>
                            <th th:text="#{accions}">Accions</th>
                        </tr>
                    </thead>
                    <tbody id="tablaLots">
                        <tr><td colspan="7" class="text-center" th:text="#{carregant}">Carregant...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
<!-- Modal de Confirmació -->
<div id="confirmModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99999;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:12px;padding:30px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div id="confirmContent"></div>
        <div style="display:flex;justify-content:center;gap:10px;margin-top:20px;">
            <button onclick="tancarModal()" style="padding:10px 20px;border:1px solid #ccc;border-radius:6px;background:white;cursor:pointer;" th:text="#{cancelar}">Cancel·lar</button>
            <button id="btnConfirmarAccio" onclick="confirmarAccio()" style="padding:10px 20px;border:none;border-radius:6px;cursor:pointer;"></button>
        </div>
    </div>
</div>
<!-- Modal de Confirmació -->
<div id="confirmModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99999;justify-content:center;align-items:center;">
    <div style="background:white;border-radius:12px;padding:30px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
        <div id="confirmContent"></div>
        <div style="display:flex;justify-content:center;gap:10px;margin-top:20px;">
            <button onclick="tancarModal()" style="padding:10px 20px;border:1px solid #ccc;border-radius:6px;background:white;cursor:pointer;" th:text="#{cancelar}">Cancel·lar</button>
            <button id="btnConfirmarAccio" onclick="confirmarAccio()" style="padding:10px 20px;border:none;border-radius:6px;cursor:pointer;"></button>
        </div>
    </div>
</div>

<!-- Modal Producció del Lot -->
<div class="modal fade" id="produccioModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header" style="background: linear-gradient(135deg, #A0522D, #8B5E3C); color: white;">
                <h5 class="modal-title"><i class="fas fa-industry"></i> <span th:text="#{lots.produccio.titol}">Producció del Lot</span></h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" th:aria-label="#{tancar}"></button>
            </div>
            <div class="modal-body">
                <div class="table-container">
                    <table class="table-custom">
                        <thead>
                            <tr>
                                <th th:text="#{lots.produccio.producte}">Producte</th>
                                <th th:text="#{lots.produccio.quantitat}">Quantitat</th>
                                <th th:text="#{lots.produccio.client}">Client</th>
                                <th th:text="#{lots.produccio.albara}">Albarà</th>
                                <th th:text="#{lots.produccio.data}">Data</th>
                            </tr>
                        </thead>
                        <tbody id="produccioBody">
                            <tr><td colspan="5" class="text-center" th:text="#{carregant}">Carregant...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-secondary" data-bs-dismiss="modal" th:text="#{cancelar}">Tancar</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/lots.js}"></script>
</body>
</html>
